<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskFlow SaaS Dashboard</title>

    <link rel="stylesheet" href="../assets/css/dashboard.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>TaskFlow</h2>

        <a class="active" onclick="showView('dashboard')">Dashboard</a>
        <a onclick="showView('analytics')">Analytics</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- DASHBOARD VIEW -->
        <div id="dashboardView">

            <div class="topbar">
                <h2>Dashboard</h2>

                <input type="text" id="searchInput" placeholder="Search tasks...">
                <button id="darkModeBtn">🌙</button>
            </div>

            <div class="add-task">
                <button id="saveTaskBtn">+ Add Task</button>
                <button onclick="exportTasks()">Export</button>
            </div>

            <div class="cards">
                <div class="card"><h3>Total</h3><p>0</p></div>
                <div class="card"><h3>Completed</h3><p>0</p></div>
                <div class="card"><h3>Pending</h3><p>0</p></div>
            </div>

            <div class="board">

                <div class="column" id="pending"><h3>Pending</h3></div>
                <div class="column" id="progress"><h3>In Progress</h3></div>
                <div class="column" id="completed"><h3>Completed</h3></div>

            </div>

        </div>

        <!-- ANALYTICS VIEW -->
        <div id="analyticsView" style="display:none;">
            <h2>Analytics</h2>
            <canvas id="taskChart"></canvas>
        </div>

    </div>
</div>

<!-- MODAL -->
<div id="taskModal" class="modal">
    <div class="modal-content">

        <h2>Add Task</h2>

        <input type="text" id="modalTaskInput" placeholder="Task name">

        <select id="prioritySelect">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
        </select>

        <div class="modal-actions">
            <button id="addTaskConfirm">Add</button>
            <button id="closeModalBtn">Cancel</button>
        </div>

    </div>
</div>

<script src="../assets/js/dashboard.js"></script>

</body>
</html>
